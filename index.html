<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SémioExpert Pro - DRETTEP Intégral</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a; --bg-light: #f8fafc; --primary: #2dd4bf;
            --primary-dark: #14b8a6; --text-dark: #1e293b; --text-gray: #64748b;
            --border-color: #e2e8f0; --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background-color: var(--bg-light); overflow: hidden; }

        /* Sidebar & Navigation */
        .sidebar { width: 260px; background-color: var(--bg-dark); color: white; display: flex; flex-direction: column; padding: 20px; transition: 0.3s; }
        .logo { font-size: 22px; font-weight: bold; color: var(--primary); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 12px 15px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #cbd5e1; font-size: 14px; }
        .nav-item.active { background: rgba(45, 212, 191, 0.2); color: var(--primary); }
        
        /* Main */
        .main-content { flex: 1; padding: 25px; overflow-y: auto; }
        .mobile-header { display: none; background: white; padding: 15px; border-bottom: 1px solid var(--border-color); justify-content: space-between; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 15px; }
        .stat-icon { width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* Table */
        .table-container { background: white; border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 15px; text-align: left; font-size: 12px; text-transform: uppercase; color: var(--text-gray); border-bottom: 1px solid var(--border-color); }
        td { padding: 15px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }

        /* Modal DRETTEP */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 1100px; height: 85vh; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 20px 30px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { display: flex; flex: 1; overflow: hidden; }
        .modal-nav { width: 220px; background: #f8fafc; border-right: 1px solid var(--border-color); padding: 20px; overflow-y: auto; }
        .tab-btn { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid transparent; background: white; text-align: left; cursor: pointer; color: #475569; font-weight: 500; font-size: 13px; transition: 0.2s; }
        .tab-btn.active { border-color: var(--primary); color: var(--primary-dark); background: #f0fdfa; }
        .modal-view { flex: 1; padding: 30px; overflow-y: auto; line-height: 1.6; }

        /* Medical Content Styling */
        .med-section { margin-bottom: 25px; }
        .med-title { color: var(--primary-dark); font-weight: bold; border-bottom: 2px solid #f0fdfa; margin-bottom: 10px; padding-bottom: 5px; }
        .med-table { width: 100%; margin-top: 10px; border: 1px solid #e2e8f0; font-size: 13px; }
        .med-table th { background: #f1f5f9; padding: 8px; }
        .med-table td { padding: 8px; border: 1px solid #e2e8f0; }
        .diff-box { background: #fff7ed; border-left: 4px solid #f97316; padding: 10px; margin: 10px 0; font-size: 13px; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-header { display: flex; }
            .modal-body { flex-direction: column; }
            .modal-nav { width: 100%; display: flex; overflow-x: auto; padding: 10px; border-right: none; border-bottom: 1px solid var(--border-color); }
            .tab-btn { min-width: 120px; margin-bottom: 0; margin-right: 10px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><i class="fas fa-microscope"></i> SémioExpert</div>
        <div class="nav-item active"><i class="fas fa-home"></i> Dashboard</div>
        <div class="nav-item"><i class="fas fa-book-medical"></i> Pathologies</div>
        <div class="user-info" style="margin-top:auto">
            <p>Mode: Interne / Expert</p>
            <span class="badge" style="background:var(--primary); color:white">2026 UPDATE</span>
        </div>
    </div>

    <div class="main-content">
        <div class="mobile-header">
            <div class="logo">SémioExpert</div>
            <i class="fas fa-bars"></i>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon" style="background:#ccfbf1; color:#0f766e"><i class="fas fa-stethoscope"></i></div>
                <div><h3>21</h3><p style="font-size:12px; color:gray">Modules DRETTEP</p></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#e0f2fe; color:#0369a1"><i class="fas fa-clipboard-check"></i></div>
                <div><h3>Précision</h3><p style="font-size:12px; color:gray">Données Académiques</p></div>
            </div>
        </div>

        <h2>Base de Données Médicale Complète</h2><br>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Pathologie</th>
                        <th>Spécialité</th>
                        <th>Niveau</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="pathology-list"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <span id="m-spec" class="badge" style="background:#f1f5f9; color:#475569"></span>
                    <h2 id="m-title" style="margin-top:5px"></h2>
                </div>
                <button onclick="closeModal()" style="border:none; background:none; font-size:24px; cursor:pointer">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-nav">
                    <button class="tab-btn active" onclick="switchTab('def', this)">Définition / Type</button>
                    <button class="tab-btn" onclick="switchTab('etio', this)">Étiologie / Physiopath</button>
                    <button class="tab-btn" onclick="switchTab('semio', this)">Sémiologie & Dg Diff</button>
                    <button class="tab-btn" onclick="switchTab('para', this)">Paraclinique & Valeurs</button>
                    <button class="tab-btn" onclick="switchTab('evo', this)">Évolution & Risques</button>
                    <button class="tab-btn" onclick="switchTab('trait', this)">Traitement & Justif.</button>
                </div>
                <div class="modal-view" id="modal-view"></div>
            </div>
        </div>
    </div>

    <    <script>
        const pathologies = [
            // --- HÉMATOLOGIE (Existants) ---
            {
                name: "Anémie (Syndrome)", spec: "HÉMATOLOGIE",
                drettep: {
                    def: `<div class="med-section">
                        <p class="med-title">Définition OMS</p>
                        Baisse de l'hémoglobine circulante : 
                        <ul>
                            <li>Homme : < 13 g/dL</li>
                            <li>Femme : < 12 g/dL</li>
                            <li>Femme enceinte (T2) : < 10,5 g/dL</li>
                        </ul>
                    </div>`,
                    etio: `<div class="med-section"><p class="med-title">Physiopathologie</p>- <strong>Centrale :</strong> Défaut de production médullaire (Carence Fer/B12).<br>- <strong>Périphérique :</strong> Excès de perte ou destruction (Hémorragie, Hémolyse).</div>`,
                    semio: `<div class="med-section"><p class="med-title">Sémiologie</p>- Pâleur cutanéo-muqueuse, asthénie, dyspnée d'effort, tachycardie.</div>`,
                    para: `<div class="med-section"><p class="med-title">Paraclinique</p><table class="med-table"><tr><th>Examen</th><th>Normal / Patho</th></tr><tr><td>NFS, VGM, Réticulocytes</td><td>Permet de typer l'anémie (Micro/Macro, Régénérative ou non)</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Évolution</p>Choc hypovolémique (aiguë), Insuffisance cardiaque (chronique).</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement</p>Fer oral (carence), Transfusion (si Hb < 7 ou mal tolérée), ttt étiologique.</div>`
                }
            },
            {
                name: "Drépanocytose", spec: "HÉMATOLOGIE",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Hémoglobinopathie</p>Maladie génétique autosomique récessive (HbS).</div>`,
                    etio: `<div class="med-section"><p class="med-title">Physiopathologie</p>Polymérisation de l'HbS en hypoxie -> falciformation -> Vaso-occlusion.</div>`,
                    semio: `<div class="med-section"><p class="med-title">Sémiologie</p>Crises Vaso-Occlusives (CVO) douloureuses, Ictère (hémolyse).</div>`,
                    para: `<div class="med-section"><p class="med-title">Paraclinique</p><table class="med-table"><tr><th>Examen</th><th>Résultat Patho</th></tr><tr><td>Electrophorèse Hb</td><td>Présence HbS</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Évolution</p>Syndrome Thoracique Aigu, AVC, Ostéonécrose.</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement</p>Hydratation, Antalgiques paliers 1 à 3, Hydroxyurée, Transfusion/Échange transfusionnel.</div>`
                }
            },

            // --- HÉPATO-GASTRO-ENTÉROLOGIE ---
            {
                name: "Gastro-entérite Aiguë", spec: "HÉPATO-GASTRO",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Définition</p>Inflammation de la muqueuse gastrique et intestinale d'apparition brutale.</div>`,
                    etio: `<div class="med-section"><p class="med-title">Étiologie</p>- <strong>Virale (70%) :</strong> Rotavirus, Norovirus.<br>- <strong>Bactérienne :</strong> Salmonella, Shigella, E. Coli, Campylobacter.<br>- <strong>Parasitaire :</strong> Giardia, Amibes.</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie</p>
                        Diarrhée (aqueuse ou glairo-sanglante), vomissements, douleurs abdominales, fièvre.
                        <div class="diff-box"><strong>Dg Différentiel :</strong> Appendicite aiguë, TIAC, Paludisme (zone endémique).</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Paraclinique</p><table class="med-table"><tr><th>Examen</th><th>Indication</th></tr><tr><td>Coproculture / EPS</td><td>Si syndrome dysentérique ou persistance > 3j</td></tr><tr><td>Ionogramme sanguin</td><td>Recherche de troubles hydro-électrolytiques</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Évolution</p>Déshydratation aiguë, Choc hypovolémique, Insuffisance rénale aiguë fonctionnelle.</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement</p>Réhydratation (SRO per os ou Ringer Lactate IV), Antisécrétoires, ATB si signes d'invasion (ex: Azithromycine).</div>`
                }
            },
            {
                name: "Hémorragie Digestive", spec: "HÉPATO-GASTRO",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Définition</p>Saignement extériorisé ou non, provenant du tube digestif (Haute : en amont de l'angle de Treitz ; Basse : en aval).</div>`,
                    etio: `<div class="med-section"><p class="med-title">Étiologie</p>- <strong>Haute :</strong> Ulcère gastro-duodénal, Rupture de varices œsophagiennes (RVO), Gastrite érosive.<br>- <strong>Basse :</strong> Diverticulose, Tumeurs colorectales, Angiodysplasies, Hémorroïdes.</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie</p>
                        - <strong>Haute :</strong> Hématémèse (sang rouge vomi), Méléna (sang noir digéré).<br>
                        - <strong>Basse :</strong> Rectorragies (sang rouge anal).
                        <div class="diff-box"><strong>Dg Différentiel :</strong> Hémoptysie (sang craché, aéré), Épistaxis déglutie, Coloration par aliments (betteraves) ou fer.</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Paraclinique</p><table class="med-table"><tr><th>Examen</th><th>Justification</th></tr><tr><td>Endoscopie digestive haute</td><td>Diagnostique et thérapeutique (pose de clips, ligature). Urgence !</td></tr><tr><td>Coloscopie</td><td>Pour les saignements bas.</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Risques</p>Choc hémorragique, Récidive, Décès.</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement</p>2 Voies veineuses périphériques, Remplissage, Transfusion, IPP IV (si non cirrhotique) ou Octréotide (si RVO), Hémostase endoscopique.</div>`
                }
            },
            {
                name: "Hépatalgie & Hépatomégalie", spec: "HÉPATO-GASTRO",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Définition</p>Hépatalgie : Douleur de l'hypochondre droit liée à la mise en tension de la capsule de Glisson. Hépatomégalie : Flèche hépatique > 12 cm.</div>`,
                    etio: `<div class="med-section"><p class="med-title">Physiopathologie</p>Distension rapide de la capsule (inflammation, stase sanguine, tumeur).</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie</p>
                        Douleur HCD irradiant vers l'épaule droite, parfois rythmée par l'effort (foie cardiaque).
                        <div class="diff-box">
                            <strong>Diagnostic Différentiel des Hépatomégalies :</strong><br>
                            🔴 <strong>Sensibles (douloureuses) :</strong> Foie cardiaque (reflux hépato-jugulaire), Hépatite aiguë, Abcès amibien/à pyogènes, CHC en poussée.<br>
                            🔵 <strong>Non sensibles (indolores) :</strong> Cirrhose (bord inférieur tranchant), Stéatose, Foie tumoral métastatique (nodulaire, dur), Kyste biliaire.
                        </div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Paraclinique</p><table class="med-table"><tr><th>Examen</th><th>Recherche</th></tr><tr><td>Échographie abdominale</td><td>Taille du foie, homogénéité, voies biliaires.</td></tr><tr><td>Bilan hépatique</td><td>ASAT/ALAT, GGT, PAL, Bilirubine, TP.</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Évolution</p>Dépend de l'étiologie (Insuffisance hépato-cellulaire, rupture d'abcès).</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement</p>Étiologique. Antalgiques prudents (éviter le Paracétamol et les AINS si insuffisance hépatique sévère).</div>`
                }
            },
            {
                name: "Ascite", spec: "HÉPATO-GASTRO",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Définition</p>Épanchement liquide intracavitaire péritonéal non sanglant.</div>`,
                    etio: `<div class="med-section"><p class="med-title">Étiologie</p>- <strong>Transsudat (Prot < 25g/L) :</strong> Cirrhose (HTP), Insuffisance Cardiaque Droite, Syndrome néphrotique.<br>- <strong>Exsudat (Prot > 25g/L) :</strong> Carcinose péritonéale, Tuberculose péritonéale.</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie</p>
                        Augmentation du volume de l'abdomen, matité déclive et mobile sur les flancs, signe du glaçon, pli de la peau (si tendue).
                        <div class="diff-box"><strong>Dg Différentiel :</strong> Globe vésical, Grossesse, Kyste ovarien géant, Météorisme (les 3 F : Fluid, Fat, Feces, Flatus, Fetus).</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Paraclinique</p><table class="med-table"><tr><th>Examen</th><th>Analyse</th></tr><tr><td>Ponction exploratrice</td><td>Biochimie (protéines), Cytologie, Bactériologie. Indispensable !</td></tr><tr><td>Échographie</td><td>Confirme l'épanchement dès 100ml.</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Complications</p>Infection du liquide d'ascite (urgence vitale), hernie ombilicale, dyspnée de compression.</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement</p>Régime désodé, Diurétiques (Spironolactone +/- Furosémide), Ponction évacuatrice avec compensation par Albumine si > 5L retirés.</div>`
                }
            },

            // --- PNEUMOLOGIE ---
            {
                name: "Embolie Pulmonaire", spec: "PNEUMOLOGIE",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Urgence Vitale</p>Obstruction d'une artère pulmonaire par un thrombus (souvent d'une TVP).</div>`,
                    etio: `<div class="med-section"><p class="med-title">Physiopathologie</p>Obstruction -> Augmentation de la post-charge du VD -> Cœur pulmonaire aigu + Hypoxémie. Triade de Virchow : stase, lésion endothéliale, hypercoagulabilité.</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie</p>
                        Dyspnée brutale, douleur basi-thoracique, toux, tachycardie. Signes de TVP.
                        <div class="diff-box"><strong>Dg Diff :</strong> IDM, Dissection aortique, Pneumothorax, Pneumonie.</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Paraclinique</p><table class="med-table"><tr><th>Examen</th><th>Résultat Patho</th></tr><tr><td>Angioscanner</td><td>Défaut de remplissage artériel (Gold Standard).</td></tr><tr><td>ECG</td><td>S1Q3, Tachycardie, BBD.</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Risques</p>Choc cardiogénique, Mort subite, Cœur Pulmonaire Chronique.</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement</p>Oxygénothérapie, Anticoagulation curative (HBPM/AOD), Thrombolyse si choc (instabilité hémodynamique).</div>`
                }
            },
            {
                name: "Tuberculose Pulmonaire", spec: "PNEUMOLOGIE",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Définition</p>Infection bactérienne causée par Mycobacterium tuberculosis (Bacille de Koch).</div>`,
                    etio: `<div class="med-section"><p class="med-title">Étiologie</p>Transmission strictement interhumaine par voie aérienne (gouttelettes de Flügge). Granulome épithélio-giganto-cellulaire avec nécrose caséeuse.</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie</p>
                        Toux chronique (> 3 semaines), Hémoptysie, 3A (Asthénie, Anorexie, Amaigrissement), Sueurs nocturnes, Fébrilité vespérale.
                        <div class="diff-box"><strong>Dg Diff :</strong> Cancer bronchique, Pneumopathie bactérienne, Abcès pulmonaire.</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Paraclinique</p><table class="med-table"><tr><th>Examen</th><th>Recherche</th></tr><tr><td>Radio Thorax</td><td>Infiltrats, cavernes (souvent aux sommets).</td></tr><tr><td>Bactériologie (Crachats)</td><td>Examen direct (BAAR) et culture ou GeneXpert.</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Évolution</p>Dissémination miliaire, Méningite tuberculeuse, Détresse respiratoire. Guérison sous TTT.</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement</p>Quadrithérapie (RHZE) pdt 2 mois puis Bithérapie (RH) pdt 4 mois. Isolement respiratoire. (R: Rifampicine, H: Isoniazide, Z: Pyrazinamide, E: Ethambutol).</div>`
                }
            },
            {
                name: "Asthme", spec: "PNEUMOLOGIE",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Définition</p>Maladie inflammatoire chronique des voies aériennes caractérisée par une hyperréactivité bronchique et une obstruction réversible.</div>`,
                    etio: `<div class="med-section"><p class="med-title">Physiopathologie</p>Bronchospasme + Œdème muqueux + Hypersécrétion de mucus. Terrain atopique fréquent.</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie</p>
                        Crises de dyspnée expiratoire sifflante, toux quinteuse, oppression thoracique. Souvent nocturne ou au réveil.
                        <div class="diff-box"><strong>Dg Diff :</strong> BPCO (obstruction non réversible), OAP (asthme cardiaque - crépitants), Embolie pulmonaire.</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Paraclinique</p><table class="med-table"><tr><th>Examen</th><th>Résultat Patho</th></tr><tr><td>EFR (Spirométrie)</td><td>Trouble Ventilatoire Obstructif (TVO) réversible sous Ventoline.</td></tr><tr><td>DEP (Peak Flow)</td><td>Surveillance de la sévérité.</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Évolution</p>Asthme aigu grave (AAG - urgence absolue), Remodelage bronchique.</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement</p>- <strong>Crise :</strong> Bronchodilatateur courte action (Salbutamol).<br>- <strong>Fond :</strong> Corticoïdes inhalés (CSI) +/- LABA.</div>`
                }
            },
            {
                name: "OAP (Œdème Aigu du Poumon)", spec: "PNEUMOLOGIE", // Souvent mixte Cardio/Pneumo
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Définition</p>Inondation brutale des alvéoles pulmonaires par du plasma sanguin.</div>`,
                    etio: `<div class="med-section"><p class="med-title">Étiologie</p>- <strong>Hémodynamique (Cardiogénique) :</strong> Insuffisance Cardiaque Gauche, Poussée hypertensive.<br>- <strong>Lésionnel (SDRA) :</strong> Infection, toxiques.</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie</p>
                        Dyspnée aiguë, orthopnée, toux avec expectorations mousseuses saumonées. Auscultation : Râles crépitants en "marée montante".
                        <div class="diff-box"><strong>Dg Diff :</strong> Asthme, Exacerbation de BPCO, Pneumonie sévère.</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Paraclinique</p><table class="med-table"><tr><th>Examen</th><th>Signes</th></tr><tr><td>Radio Thorax</td><td>Opacités floconneuses bilatérales en ailes de papillon.</td></tr><tr><td>BNP / NT-proBNP</td><td>Élevé si origine cardiaque.</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Risques</p>Asphyxie, Arrêt cardiorespiratoire.</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement (Cardiogénique)</p>Position assise, Oxygène, Diurétiques de l'anse IV (Lasilix), Dérivés nitrés IV. Pression Positive Continue (VNI).</div>`
                }
            },

            // --- CARDIOLOGIE ---
            {
                name: "Hypertension Artérielle (HTA)", spec: "CARDIOLOGIE",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Définition OMS</p>Pression Artérielle Systolique (PAS) ≥ 140 mmHg et/ou Diastolique (PAD) ≥ 90 mmHg, mesurée au cabinet (ou > 135/85 en automesure).</div>`,
                    etio: `<div class="med-section"><p class="med-title">Étiologie</p>- <strong>Essentielle (95%) :</strong> Facteurs génétiques, sel, âge, sédentarité, obésité.<br>- <strong>Secondaire (5%) :</strong> Sténose artère rénale, Phéochromocytome, Hyperaldostéronisme.</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie</p>
                        Souvent asymptomatique ("tueur silencieux"). Céphalées occipitales matinales, acouphènes, phosphènes, épistaxis.
                        <div class="diff-box"><strong>Urgence Hypertensive :</strong> HTA sévère + Souffrance d'organe cible (OAP, Dissection, Encephalopathie).</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Bilan Retentissement</p><table class="med-table"><tr><th>Examen</th><th>Cible</th></tr><tr><td>ECG / Echo Cœur</td><td>Hypertrophie Ventriculaire Gauche (HVG).</td></tr><tr><td>Créatinine, BU</td><td>Néphropathie hypertensive, Protéinurie.</td></tr><tr><td>Fond d'Oeil</td><td>Rétinopathie.</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Complications</p>AVC, IDM, Insuffisance Rénale Chronique, Insuffisance Cardiaque.</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement</p>Règles hygiéno-diététiques. Traitement pharmacologique (IEC, ARA2, Inhibiteurs calciques, Diurétiques thiazidiques).</div>`
                }
            },
            {
                name: "Insuffisance Cardiaque (IC)", spec: "CARDIOLOGIE",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Définition</p>Incapacité du cœur à assurer un débit sanguin suffisant pour répondre aux besoins métaboliques des organes.</div>`,
                    etio: `<div class="med-section"><p class="med-title">Étiologie</p>Cardiopathie ischémique (post-IDM), HTA, Valvulopathies, Cardiomyopathie dilatée/hypertrophique.</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie (Chroniques)</p>
                        - <strong>Gauche :</strong> Dyspnée d'effort, orthopnée, crépitants, B3.<br>
                        - <strong>Droite :</strong> Turgescence jugulaire, reflux hépato-jugulaire, hépatomégalie, OMI (Œdèmes des Membres Inférieurs).
                        <div class="diff-box"><strong>Classification NYHA :</strong> Stade I (aucun signe) à Stade IV (dyspnée au repos).</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Paraclinique</p><table class="med-table"><tr><th>Examen</th><th>Résultat Patho</th></tr><tr><td>Échographie Transthoracique</td><td>FEVG abaissée (< 40%) ou préservée, dilatation des cavités.</td></tr><tr><td>BNP</td><td>Élevé (marqueur de distension ventriculaire).</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Évolution</p>Décompensation aiguë (OAP, Choc cardiogénique), Troubles du rythme, Décès.</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement (Fond)</p>Bêtabloquants, IEC/ARA2/ARNI (Entresto), Antagonistes de l'aldostérone, iSGLT2 (Dapagliflozine). Diurétiques pour la congestion.</div>`
                }
            },
            {
                name: "Décompensation Cardiaque Globale", spec: "CARDIOLOGIE",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Définition</p>Exacerbation aiguë associant les signes d'insuffisance cardiaque gauche (pulmonaire) et droite (systémique).</div>`,
                    etio: `<div class="med-section"><p class="med-title">Facteurs déclenchants</p>Écart de régime (sel), Rupture de traitement, Arythmie (FA), Infection, Ischémie myocardique.</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie</p>
                        - <strong>Congestion amont :</strong> OAP (crépitants, dyspnée de repos), OMI massifs remontant jusqu'aux lombes, Ascite, Turgescence jugulaire.<br>
                        - <strong>Bas débit aval :</strong> Asthénie, oligurie, confusion, extrémités froides (signes de gravité).
                        <div class="diff-box"><strong>Profil hémodynamique :</strong> Chaud/Humide (fréquent), Froid/Humide (choc cardiogénique).</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Paraclinique en urgence</p><table class="med-table"><tr><th>Examen</th><th>Urgence</th></tr><tr><td>Gaz du sang</td><td>Hypoxémie, Acidose (si choc).</td></tr><tr><td>Troponine, BNP, Ionogramme</td><td>Infarctus associé, fonction rénale (IRA fonctionnelle).</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Pronostic</p>Risque de décès par choc cardiogénique ou FV/TV. Nécessite une hospitalisation d'urgence.</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement (Aigu)</p>Oxygène (ou VNI si OAP), Diurétiques IV fortes doses (Furosémide), Vasodilatateurs (Nitrés) si TA > 110mmHg, Inotropes (Dobutamine) si choc.</div>`
                }
            },

            // --- PATHOLOGIE INFECTIEUSE ET TROPICALE (PIT) ---
            {
                name: "Infection à VIH", spec: "MALADIES INFECTIEUSES",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Définition</p>Infection rétrovirale par le Virus de l'Immunodéficience Humaine détruisant les lymphocytes T CD4.</div>`,
                    etio: `<div class="med-section"><p class="med-title">Transmission</p>Sexuelle (majoritaire), Sanguine (UDVI, transfusion), Materno-fœtale.</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie</p>
                        - <strong>Primo-infection :</strong> Syndrome pseudo-mononucléosique (fièvre, adénopathies, rash, ulcérations muqueuses).<br>
                        - <strong>Stade SIDA (CD4 < 200) :</strong> Infections opportunistes (Pneumocystose, Toxoplasmose cérébrale, Candidose œsophagienne) et Tumeurs (Sarcome de Kaposi).
                        <div class="diff-box"><strong>Dg Diff Primo-infection :</strong> EBV (MNI), CMV, Syphilis secondaire.</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Diagnostic & Suivi</p><table class="med-table"><tr><th>Examen</th><th>Normal / Patho</th></tr><tr><td>Sérologie ELISA mixte</td><td>Dépistage. Confirmation par Western Blot (ou test de 2ème intention).</td></tr><tr><td>Charge virale (ARN VIH) & Taux CD4</td><td>Suivi de l'efficacité thérapeutique. Objectif : CV indétectable, CD4 > 500.</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Évolution</p>Maladie chronique sous traitement, espérance de vie quasi normale. Sans traitement : SIDA et décès par infection/tumeur.</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement</p>Trithérapie antirétrovirale (ARV) à vie : 2 INTI (ex: Ténofovir + Emtricitabine) + 1 INI (Dolutégravir) ou INNTI ou IP. Prophylaxie des IO si CD4 très bas (Bactrim).</div>`
                }
            },
            {
                name: "Sepsis & Choc Septique", spec: "RÉANIMATION / INFECTIOLOGIE",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Définition (Sepsis-3)</p>Dysfonction d'organe menaçant le pronostic vital, causée par une réponse dérégulée de l'hôte à une infection.</div>`,
                    etio: `<div class="med-section"><p class="med-title">Étiologie</p>Bactéries à Gram négatif (E. coli, Pseudomonas), Gram positif (Staphylocoque, Pneumocoque), Fungi, Virus. Foyers : pulmonaire, urinaire, digestif, cathéter.</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie</p>
                        Fièvre (ou hypothermie), Frissons, Tachycardie, Tachypnée (Score qSOFA : FR ≥ 22, Glasgow < 15, PAS ≤ 100).
                        <div class="diff-box"><strong>Choc Septique :</strong> Sepsis + besoin de vasopresseurs pour PAM ≥ 65 mmHg + Lactates > 2 mmol/L malgré un remplissage adéquat.</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Paraclinique (Urgence)</p><table class="med-table"><tr><th>Examen</th><th>Recherche</th></tr><tr><td>Hémocultures</td><td>Avant toute antibiothérapie (si possible dans l'heure).</td></tr><tr><td>Lactates sanguins</td><td>Marqueur d'hypoperfusion tissulaire.</td></tr><tr><td>Bilan infectieux ciblé</td><td>ECBU, Radio thorax, Ponction lombaire selon le point d'appel.</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Évolution</p>Défaillance multiviscérale (CIVD, SDRA, Insuffisance Rénale Aiguë), Décès (mortalité élevée, 40% pour le choc).</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement (Sepsis Six - Première Heure)</p>1. Oxygène. 2. Hémocultures. 3. Antibiothérapie probabiliste large spectre IV. 4. Remplissage (Cristalloïdes 30ml/kg). 5. Dosages Lactates. 6. Surveillance diurèse/constantes. (Noradrénaline si choc).</div>`
                }
            },

            // --- NÉPHROLOGIE ---
            {
                name: "Insuffisance Rénale Aiguë (IRA)", spec: "NÉPHROLOGIE",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Définition (KDIGO)</p>Baisse brutale de la filtration glomérulaire (élévation de la créatinine ≥ 26,5 µmol/L en 48h ou x1,5 en 7 jours) +/- oligurie.</div>`,
                    etio: `<div class="med-section"><p class="med-title">Classification</p>- <strong>Pré-rénale (Fonctionnelle) :</strong> Hypoperfusion (Déshydratation, Choc, IEC, AINS).<br>- <strong>Intra-rénale (Organique) :</strong> NTA (Nécrose Tubulaire Aiguë par ischemie/toxique), NTI (Allergie), Glomérulonéphrite (Lupus).<br>- <strong>Post-rénale (Obstructive) :</strong> Lithiase bilatérale, Hypertrophie prostatique.</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie</p>
                        Oligo-anurie (Diurèse < 500 ml/24h) ou diurèse conservée. Signes d'hyperkaliémie (troubles du rythme).
                        <div class="diff-box"><strong>Diagnostic Différentiel (IRC vs IRA) :</strong> IRA = Reins de taille normale à l'échographie, pas d'anémie chronique, pas d'hypocalcémie chronique (sauf rhabdomyolyse).</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Paraclinique</p><table class="med-table"><tr><th>Examen</th><th>Justification</th></tr><tr><td>Échographie rénale</td><td>Éliminer un obstacle (Dilatation des cavités = Post-rénale).</td></tr><tr><td>Ionogramme Sanguin/Urinaire</td><td>Urgence = Hyperkaliémie. Index urinaire (Na/K) pour différencier Fonctionnelle vs Organique.</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Complications</p>Hyperkaliémie menaçante (arrêt cardiaque), OAP, Acidose métabolique. Séquelles possibles (IRC).</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement</p>Étiologique ! (Lever l'obstacle, Remplir, Arrêter les néphrotoxiques). Épuration extrarénale (Dialyse) si indications de sauvetage (OAP résistant, K+ très élevé).</div>`
                }
            },
            {
                name: "Maladie Rénale Chronique (MRC)", spec: "NÉPHROLOGIE",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Définition</p>Baisse progressive et irréversible de la fonction rénale : DFG (Débit de Filtration Glomérulaire) < 60 ml/min/1.73m² pendant plus de 3 mois.</div>`,
                    etio: `<div class="med-section"><p class="med-title">Étiologie</p>Diabète (Néphropathie diabétique - 1ère cause), HTA (Néphroangiosclérose), Glomérulonéphrites chroniques, Polykystose rénale autosomique dominante (PKRAD).</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie</p>
                        Longtemps asymptomatique. Asthénie (anémie), Nycturie, Œdèmes, Prurit, Crampes, Teint terreux, HTA résistante.
                        <div class="diff-box"><strong>Stades DFG :</strong> 1: Normal, 2: Légère (60-89), 3a/3b: Modérée/Sévère, 4: Pré-terminale (15-29), 5: Terminale (< 15).</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Bilan de Retentissement</p><table class="med-table"><tr><th>Examen</th><th>Trouble Associé</th></tr><tr><td>NFS</td><td>Anémie normocytaire arégénérative (Défaut d'EPO).</td></tr><tr><td>Bilan Phosphocalcique</td><td>Hypocalcémie, Hyperphosphatémie, Hyperparathyroïdie secondaire.</td></tr><tr><td>Protéinurie des 24h / BU</td><td>Évaluation de l'atteinte glomérulaire (Microalbuminurie).</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Évolution</p>Insuffisance rénale terminale, Risque cardiovasculaire majeur (calcifications vasculaires), Ostéodystrophie rénale.</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement</p>Néphroprotection (Contrôle strict TA, IEC/ARA2, baisse protéinurie). Traiter complications (EPO, vit D, chélateurs phosphore). Stade 5 : Dialyse ou Transplantation.</div>`
                }
            },

            // --- NEUROLOGIE ---
            {
                name: "Accident Vasculaire Cérébral (AVC)", spec: "NEUROLOGIE",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Urgence Absolue</p>Déficit neurologique focal d'apparition soudaine lié à une lésion vasculaire cérébrale (Ischémique - 80% ou Hémorragique - 20%).</div>`,
                    etio: `<div class="med-section"><p class="med-title">Étiologie</p>- <strong>Ischémique (Infarctus) :</strong> Athérosclérose (carotide), Cardioembolie (FA), Maladie des petites artères (lacunes liées à l'HTA).<br>- <strong>Hémorragique :</strong> HTA, Rupture d'anévrisme, Angiopathie amyloïde.</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie ("VITE/FAST")</p>
                        Apparition brutale de : Hémiplégie, Hémianesthésie, Aphasie (atteinte hémisphère dominant), Hémianopsie, Ataxie.
                        <div class="diff-box"><strong>Dg Différentiel :</strong> Hypoglycémie (toujours faire un HGT !), Crise d'épilepsie (déficit post-critique de Todd), Migraine avec aura, Tumeur (mais installation progressive).</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Imagerie en Urgence</p><table class="med-table"><tr><th>Examen</th><th>Objectif</th></tr><tr><td>IRM Cérébrale (Diffusion/FLAIR/T2*/Angio)</td><td>Gold standard. Confirme l'ischémie très précocement, élimine le saignement.</td></tr><tr><td>Scanner cérébral sans injection</td><td>Si IRM indisponible. Élimine l'hémorragie avant thrombolyse.</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Risques</p>Engagement (œdème cérébral), Transformation hémorragique, Récidive, Handicap séquellaire moteur/cognitif.</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement (Filière AVC)</p>- <strong>Ischémique :</strong> Thrombolyse IV (si < 4h30) et/ou Thrombectomie mécanique (si < 6h, parfois plus). Aspirine.<br>- <strong>Hémorragique :</strong> Contrôle strict de la TA, correction des troubles de coagulation. Neurochirurgie si indication.</div>`
                }
            },
            {
                name: "Coma Fébrile", spec: "NEURO / INFECTIO",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Définition</p>Altération prolongée de l'état de conscience (Glasgow < 8) non réversible par les stimulations, associée à une température > 38°C (ou parfois hypothermie).</div>`,
                    etio: `<div class="med-section"><p class="med-title">Étiologie (Infections du SNC prioritaires)</p>Méningite bactérienne (Pneumocoque, Méningocoque, Listeria), Méningo-encéphalite herpétique, Paludisme grave (neuropaludisme), Abcès cérébral, Sepsis grave.</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie</p>
                        Syndrome méningé (Raideur de nuque, photophobie, vomissements), Signes de localisation (Hémiplégie, aphasie -> Encéphalite), Crises convulsives.
                        <div class="diff-box"><strong>Attention :</strong> Purpura fulminans (Méningocoque) = Urgence absolue, C3G IV ou IM immédiate avant tout examen.</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Paraclinique</p><table class="med-table"><tr><th>Examen</th><th>Indications</th></tr><tr><td>Ponction Lombaire (PL)</td><td>Analyse LCR (bactério, chimie, PCR Herpès). Contre-indiquée si signes d'engagement.</td></tr><tr><td>TDM Cérébral (Scanner)</td><td>À réaliser avant la PL si signes de localisation neurologique ou crises focales.</td></tr><tr><td>Goutte Épaisse / Frottis</td><td>Recherche d'hématozoaires (si séjour zone endémique).</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Risques</p>Hypertension Intracrânienne (HIC), Engagement cérébral, Choc septique, Décès.</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement Urgence</p>Antibiothérapie probabiliste large (C3G + Amoxicilline) ET Antiviral (Aciclovir) IV dès la suspicion sans attendre les résultats de la PL. Traitement symptomatique (Anti-épileptiques, Réanimation).</div>`
                }
            },
            {
                name: "Coma Non Fébrile", spec: "NEUROLOGIE / TOXICO",
                drettep: {
                    def: `<div class="med-section"><p class="med-title">Définition</p>Altération de la conscience (Glasgow < 8) sans contexte infectieux patent ni fièvre initiale.</div>`,
                    etio: `<div class="med-section"><p class="med-title">Étiologie</p>- <strong>Toxique :</strong> Médicaments (BZD, Opioïdes), Alcool, CO.<br>- <strong>Métabolique :</strong> Hypoglycémie sévère, Hyponatrémie, Encéphalopathie hépatique, Urémie.<br>- <strong>Neurologique :</strong> AVC massif, Hémorragie méningée/intracérébrale, Épilepsie (État de mal non convulsivant), Tumeur.</div>`,
                    semio: `<div class="med-section">
                        <p class="med-title">Sémiologie et Examen</p>
                        - <strong>Toxique :</strong> Myosis (Opioïdes), Haleine, Traces de piqures.<br>
                        - <strong>Neuro :</strong> Asymétrie faciale, déviation conjuguée des yeux, Babinski (Signes de focalisation = lésion structurale).
                        <div class="diff-box"><strong>Évaluation indispensable :</strong> Score de Glasgow (Ouverture des yeux, Réponse Verbale, Réponse Motrice). Si ≤ 8 : Intubation oro-trachéale de protection.</div>
                    </div>`,
                    para: `<div class="med-section"><p class="med-title">Paraclinique Systématique</p><table class="med-table"><tr><th>Examen</th><th>Recherche</th></tr><tr><td>Dextro (HGT) au lit du malade</td><td>Éliminer d'emblée l'Hypoglycémie (Glycémie capillaire).</td></tr><tr><td>TDM cérébral sans injection</td><td>Éliminer une hémorragie, tumeur ou AVC ischémique étendu.</td></tr><tr><td>Bilan toxico et Ionogramme</td><td>Sang et urines, Natrémie, Calcémie, Urée/Créatinine, Bilan hépatique.</td></tr></table></div>`,
                    evo: `<div class="med-section"><p class="med-title">Évolution</p>Dépend de la cause. Rhabdomyolyse si décubitus prolongé, Pneumopathie d'inhalation.</div>`,
                    trait: `<div class="med-section"><p class="med-title">Traitement</p>- <strong>A, B, C :</strong> Libération des voies aériennes, Intubation si GCS ≤ 8.<br>- <strong>Antidotes :</strong> Naloxone (Opioïdes), Flumazénil (BZD - attention contre-indications).<br>- <strong>G30% IV :</strong> Si hypoglycémie confirmée.</div>`
                }
            }
        ];
        
        // --- RENDU ET GESTION (Inchangés) ---

        const tbody = document.getElementById('pathology-list');
        pathologies.forEach((p, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${p.name}</strong></td>
                <td><span class="badge" style="background:#e0f2fe; color:#0369a1">${p.spec}</span></td>
                <td><span class="badge" style="background:#f0fdf4; color:#166534">EXPERT</span></td>
                <td><button onclick="openModal(${index})" class="badge" style="background:var(--primary); color:white; border:none; cursor:pointer">VOIR DRETTEP</button></td>
            `;
            tbody.appendChild(tr);
        });

        let activePath = null;

        function openModal(index) {
            activePath = pathologies[index];
            document.getElementById('m-title').innerText = activePath.name;
            document.getElementById('m-spec').innerText = activePath.spec;
            document.getElementById('modal').style.display = 'flex';
            switchTab('def', document.querySelector('.tab-btn'));
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function switchTab(key, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('modal-view').innerHTML = activePath.drettep[key];
        }
    </script>
</body>
</html>
